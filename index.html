<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Форма Отчет</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body { margin: 0; background: #f0ebf8; font-family: 'Roboto', sans-serif; font-size: 12px; }
.container { max-width: 950px; margin: 40px auto; }
.header { background: #673ab7; height: 10px; border-radius: 8px 8px 0 0; }
.form-title { background: #fff; padding: 24px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
h1 { margin: 0; font-size: 24px; }
.question-card { background: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); border-left: 4px solid #673ab7; }
label { display:block; margin-bottom:4px; font-weight:500; }
textarea, select, input[type="text"], input[type="date"] { width: 100%; border: none; border-bottom: 2px solid #dadce0; padding: 4px 6px; font-size: 14px; background: transparent; }
textarea:focus, select:focus, input:focus { outline: none; border-bottom: 2px solid #673ab7; }
select { appearance: none; cursor: pointer; }
.currency-input { position: relative; display: flex; align-items: center; }
.currency-input .currency-left { position: absolute; left: 6px; font-weight: 500; color: #000; pointer-events: none; }
.currency-input input { width: 100%; padding-left: 18px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: #fff; }
.submit-box { background: #fff; padding: 20px; border-radius: 8px; text-align: right; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
button { background: #673ab7; color: #fff; border: none; padding: 10px 22px; border-radius: 4px; cursor: pointer; }
button:disabled { background: #aaa; cursor: not-allowed; }
#monthlyTable, #reportTable { width: 100%; border-spacing: 2px; margin-top: 20px; font-size: 8px; }
#monthlyTable th, #monthlyTable td, #reportTable th, #reportTable td { padding: 2px 4px; text-align: center; border-radius: 5px; font-size:8px; }
.expense-col { background: rgba(255,100,100,0.2); }
.income-col { background: rgba(100,150,255,0.2); }
.balance-col { background: rgba(144,238,144,0.3); font-weight: bold; }
#reportTable { border-collapse: collapse; }
#reportTable th, #reportTable td { border: 1px solid #ccc; padding: 4px; }
</style>

<script src="https://unpkg.com/parse/dist/parse.min.js"></script>
<script>
Parse.initialize("nRZ2VJnuAxFbP1DPxK524AAL4rUh6avCTbTnQUsL", "MXB3Tw1iF1Cw1HrqKZFFUhf7DHETzaOezipXcPtw");
Parse.serverURL = 'https://parseapi.back4app.com/';
</script>
</head>
<body>

<div class="container">
<h1>ОТЧЕТ</h1>

<input type="date" id="dateInput">
<select id="optionSelect">
<option disabled selected>Избери...</option>
<option>ПРИХОД БАР МАККУИН</option>
<option>РАЗХОД С ФАКТУРИ</option>
</select>

<input type="text" id="sumInput" placeholder="0.00">
<textarea id="notes"></textarea>

<button id="submitBtn" disabled>Изпрати</button>

<table id="reportTable">
<thead><tr><th>Дата</th><th>Опция</th><th>Сума</th><th>Пояснения</th></tr></thead>
<tbody></tbody>
<tfoot><tr><td colspan="2">Салдо</td><td id="finalBalance">0.00</td></tr></tfoot>
</table>

<table id="monthlyTable">
<tbody id="monthlyBody"></tbody>
</table>

</div>

<script>
const submitBtn = document.getElementById('submitBtn');
const optionSelect = document.getElementById('optionSelect');
const sumInput = document.getElementById('sumInput');
const notesInput = document.getElementById('notes');
const dateInput = document.getElementById('dateInput');
const reportTbody = document.querySelector('#reportTable tbody');
const monthlyBody = document.getElementById('monthlyBody');

function checkForm(){
submitBtn.disabled = !(dateInput.value && optionSelect.value && sumInput.value);
}
dateInput.oninput = checkForm;
optionSelect.oninput = checkForm;
sumInput.oninput = checkForm;

function formatDate(d){
const date=new Date(d);
return `${date.getDate()}.${date.getMonth()+1}.${date.getFullYear()}`;
}

let monthlyData=[];
for(let i=0;i<31;i++){
let tr=document.createElement('tr');
let cells=[];
for(let j=0;j<11;j++){
let td=document.createElement('td');
td.textContent='0.00';
tr.appendChild(td);
cells.push(td);
}
monthlyBody.appendChild(tr);
monthlyData.push(cells);
}

function updateMonthlyTable(date,option,sum){
let day=new Date(date).getDate()-1;
monthlyData[day][3].textContent=(parseFloat(monthlyData[day][3].textContent)+sum).toFixed(2);
}

// submit
submitBtn.onclick=async()=>{
const Report=Parse.Object.extend("ReportEntry");
const entry=new Report();

const date=dateInput.value;
const option=optionSelect.value;
const sum=parseFloat(sumInput.value);
const notes=notesInput.value;

entry.set("date",date);
entry.set("option",option);
entry.set("sum",sum);
entry.set("notes",notes);

await entry.save();

updateMonthlyTable(date,option,sum);

let tr=document.createElement('tr');
tr.innerHTML=`<td>${formatDate(date)}</td><td>${option}</td><td>${sum}</td><td>${notes}</td>`;
reportTbody.appendChild(tr);
};

// 🔥 АВТОМАТИЧНО ЗАРЕЖДАНЕ
async function loadReports(){
const Report=Parse.Object.extend("ReportEntry");
const query=new Parse.Query(Report);
query.ascending("date");

const results=await query.find();

results.forEach(obj=>{
const date=obj.get("date");
const option=obj.get("option");
const sum=parseFloat(obj.get("sum"));
const notes=obj.get("notes");

let tr=document.createElement('tr');
tr.innerHTML=`<td>${formatDate(date)}</td><td>${option}</td><td>${sum}</td><td>${notes}</td>`;
reportTbody.appendChild(tr);

updateMonthlyTable(date,option,sum);
});

let total=monthlyData.flat().reduce((a,b)=>a+parseFloat(b.textContent||0),0);
document.getElementById('finalBalance').textContent=total.toFixed(2);
}

// стартира при load
window.onload=loadReports;
</script>

</body>
</html>
