<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Форма Отчет</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<!-- Parse SDK -->
<script src="https://unpkg.com/parse/dist/parse.min.js"></script>
<script>
  // Твоите Back4App ключове
  Parse.initialize("nRZ2VJnuAxFbP1DPxK524AAL4rUh6avCTbTnQUsL", "MXB3Tw1iF1Cw1HrqKZFFUhf7DHETzaOezipXcPtw");
  Parse.serverURL = 'https://parseapi.back4app.com/';
</script>

<style>
body { margin:0; font-family:'Roboto',sans-serif; background:#f0ebf8; }
.container { max-width:950px; margin:40px auto; }
.header { background:#673ab7; height:10px; border-radius:8px 8px 0 0; }
.form-title { background:#fff; padding:24px; border-radius:0 0 8px 8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); margin-bottom:15px; }
h1 { margin:0; font-size:24px; }
.question-card { background:#fff; padding:15px 20px; border-radius:8px; margin-bottom:15px; box-shadow:0 1px 5px rgba(0,0,0,0.1); border-left:4px solid #673ab7; }
label { display:block; margin-bottom:4px; font-weight:500; }
textarea, select, input[type="text"], input[type="date"] { width:100%; border:none; border-bottom:2px solid #dadce0; padding:4px 6px; font-size:14px; background:transparent; }
textarea:focus, select:focus, input:focus { outline:none; border-bottom:2px solid #673ab7; }
select { appearance:none; background-image:url("data:image/svg+xml;utf8,<svg fill='%23673ab7' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>"); background-repeat:no-repeat; background-position:right 5px center; background-size:16px; cursor:pointer; }
.currency-input { position:relative; display:flex; align-items:center; }
.currency-input .currency-left { position:absolute; left:6px; font-weight:500; color:#000; pointer-events:none; }
.currency-input input { width:100%; padding-left:18px; border:1px solid #ccc; border-radius:4px; font-size:14px; background:#fff; }
.submit-box { background:#fff; padding:20px; border-radius:8px; text-align:right; box-shadow:0 1px 5px rgba(0,0,0,0.1); }
button { background:#673ab7; color:#fff; border:none; padding:10px 22px; border-radius:4px; cursor:pointer; }
button:disabled { background:#aaa; cursor:not-allowed; }
button:hover:not(:disabled) { background:#5e35b1; }

/* Таблица */
#reportTable, #monthlyTable { width:100%; border-collapse:separate; border-spacing:2px; font-size:12px; margin-top:10px; }
#reportTable th, #reportTable td, #monthlyTable th, #monthlyTable td { padding:2px 4px; text-align:center; border-radius:5px; position:relative; }
.date-col { background:#f2f2f2cc; } 
.expense-col { background:rgba(255,100,100,0.2); color:#800000; }
.income-col { background:rgba(100,150,255,0.2); color:#003366; }
.text-col { background:#f8f8f8cc; text-align:left; padding-left:5px; }
.balance-col { background:rgba(144,238,144,0.3); font-weight:bold; color:#155724; }
#monthlyTable td.income-col::after,#monthlyTable td.expense-col::after,#monthlyTable td.balance-col::after { content:'€'; position:absolute; right:3px; font-weight:bold; color:inherit; }
#monthlyTable td.date-col::after,#monthlyTable td.text-col::after { content:''; }
</style>
</head>

<body>
<div class="container">
  <div class="header"></div>
  <div class="form-title"><h1>ОТЧЕТ</h1></div>

  <!-- Дата -->
  <div class="question-card">
    <label>Дата</label>
    <input type="date" id="dateInput">
  </div>

  <!-- Опция -->
  <div class="question-card">
    <label>Избери опция</label>
    <select id="optionSelect">
      <option disabled selected>Избери...</option>
      <option>Опция 1</option>
      <option>Опция 2</option>
      <option>Опция 3</option>
    </select>
  </div>

  <!-- Сума -->
  <div class="question-card">
    <label>Сума</label>
    <div class="currency-input">
      <span class="currency-left">€</span>
      <input type="text" id="sumInput" placeholder="0.00">
    </div>
  </div>

  <!-- Пояснения -->
  <div class="question-card">
    <label>Пояснения</label>
    <textarea id="notes" rows="2"></textarea>
  </div>

  <!-- Submit -->
  <div class="submit-box">
    <button id="submitBtn" disabled>Изпрати</button>
  </div>

  <!-- Текущи записи -->
  <table id="reportTable">
    <thead>
      <tr><th>Дата</th><th>Опция</th><th>Сума (€)</th><th>Пояснения</th></tr>
    </thead>
    <tbody id="reportTbody"></tbody>
    <tfoot>
      <tr><td colspan="2" class="balance">Крайно салдо:</td><td id="finalBalance" class="balance">0.00</td><td></td></tr>
    </tfoot>
  </table>

  <!-- Месечна таблица -->
  <div class="question-card">
    <h3>Месечна база</h3>
    <table id="monthlyTable">
      <thead>
        <tr>
          <th class="date-col">Дата</th>
          <th class="income-col">Опция 1</th>
          <th class="income-col">Опция 2</th>
          <th class="income-col">Опция 3</th>
          <th class="balance-col">Крайно салдо</th>
        </tr>
      </thead>
      <tbody id="monthlyBody"></tbody>
    </table>
  </div>
</div>

<script>
const dateInput = document.getElementById('dateInput');
const optionSelect = document.getElementById('optionSelect');
const sumInput = document.getElementById('sumInput');
const notesInput = document.getElementById('notes');
const submitBtn = document.getElementById('submitBtn');
const reportTbody = document.getElementById('reportTbody');
const monthlyBody = document.getElementById('monthlyBody');

// Активиране на бутон само ако всички полета са попълнени
function checkForm() {
  submitBtn.disabled = !(dateInput.value && optionSelect.value && sumInput.value.trim() && !isNaN(parseFloat(sumInput.value.replace(',','.'))));
}
dateInput.addEventListener('change', checkForm);
optionSelect.addEventListener('change', checkForm);
sumInput.addEventListener('input', checkForm);

// Месечна таблица
let monthlyData = [];
for(let day=1; day<=31; day++){
  const row = document.createElement('tr');
  for(let i=0;i<5;i++){
    const td = document.createElement('td');
    if(i===0){
      const dateObj = new Date(2026,3,day);
      td.textContent = `${String(dateObj.getDate()).padStart(2,'0')}.${String(dateObj.getMonth()+1).padStart(2,'0')}.${dateObj.getFullYear()}`;
    } else { td.textContent='0.00'; }
    if(i>=1 && i<=3) td.className='income-col';
    if(i===4) td.className='balance-col';
    row.appendChild(td);
  }
  monthlyBody.appendChild(row);
  monthlyData.push(row);
}

// Форматиране дата
function formatDate(dateStr){ let d=new Date(dateStr); return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`; }

// Обновяване месечна таблица
function updateMonthlyTable(dateStr, option, sum){
  const day = new Date(dateStr).getDate();
  const row = monthlyData[day-1];
  const mapping = {"Опция 1":1,"Опция 2":2,"Опция 3":3};
  const colIndex = mapping[option];
  let current = parseFloat(row.cells[colIndex].textContent);
  row.cells[colIndex].textContent = (current + sum).toFixed(2);

  // Крайно салдо
  let prevBalance = day>1 ? parseFloat(monthlyData[day-2].cells[4].textContent) : 0;
  let income=0;
  for(let i=1;i<=3;i++) income+=parseFloat(row.cells[i].textContent);
  row.cells[4].textContent = (prevBalance + income).toFixed(2);
}

// Submit
submitBtn.addEventListener('click', async function(){
  const dateVal = dateInput.value;
  const option = optionSelect.value;
  const sum = parseFloat(sumInput.value.replace(',','.'));
  const notes = notesInput.value;

  submitBtn.disabled = true;
  submitBtn.textContent = 'Изпращане...';

  try {
    // Parse save
    const Reports = Parse.Object.extend('Reports');
    const report = new Reports();
    report.set('date', new Date(dateVal));
    report.set('option', option);
    report.set('sum', sum);
    report.set('notes', notes);
    await report.save();

    // Обновяване таблици
    updateMonthlyTable(dateVal, option, sum);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${formatDate(dateVal)}</td><td>${option}</td><td>${sum.toFixed(2)}</td><td>${notes}</td>`;
    reportTbody.appendChild(tr);

    let lastBalance = parseFloat(monthlyData.filter(r=>r.cells[4])[monthlyData.length-1].cells[4].textContent);
    document.getElementById('finalBalance').textContent = lastBalance.toFixed(2);

    // Нулиране форма
    dateInput.value=''; optionSelect.selectedIndex=0; sumInput.value=''; notesInput.value='';
    alert("Данните бяха изпратени успешно!");
  } catch(err){
    alert("Грешка при запис: "+err.message);
  } finally{
    submitBtn.disabled = true;
    submitBtn.textContent = 'Изпрати';
  }
});

// Зареждане стари записи
async function loadReports(){
  const Reports = Parse.Object.extend('Reports');
  const query = new Parse.Query(Reports);
  query.ascending("date");
  const results = await query.find();
  results.forEach(r=>{
    const d = r.get('date');
    const opt = r.get('option');
    const s = r.get('sum');
    const n = r.get('notes');
    updateMonthlyTable(d, opt, s);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${formatDate(d.toISOString())}</td><td>${opt}</td><td>${s.toFixed(2)}</td><td>${n}</td>`;
    reportTbody.appendChild(tr);
  });

  let lastBalance = parseFloat(monthlyData.filter(r=>r.cells[4])[monthlyData.length-1].cells[4].textContent);
  document.getElementById('finalBalance').textContent = lastBalance.toFixed(2);
}
loadReports();
</script>

</body>
</html>
