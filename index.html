<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Форма Отчет</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body { margin: 0; background: #f0ebf8; font-family: 'Roboto', sans-serif; font-size: 12px; }
.container { max-width: 900px; margin: 40px auto; padding: 0 10px; }
.header { background: #673ab7; height: 10px; border-radius: 8px 8px 0 0; }
.form-title { background: #fff; padding: 24px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-bottom: 15px; text-align:center; }
h1 { margin: 0; font-size: 24px; }
.question-card { background: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); border-left: 4px solid #673ab7; border-right: 4px solid #673ab7; }
label { display:block; margin-bottom:4px; font-weight:500; }
textarea, select, input[type="text"], input[type="tel"] { width: 100%; border: none; border-bottom: 2px solid #dadce0; padding: 4px 6px; font-size: 14px; background: transparent; }
textarea:focus, select:focus, input:focus { outline: none; border-bottom: 2px solid #673ab7; }
select { appearance: none; cursor: pointer; }
.currency-input { position: relative; display: flex; align-items: center; }
.currency-input .currency-left { position: absolute; left: 6px; font-weight: 500; color: #000; pointer-events: none; }
.currency-input input { width: 100%; padding-left: 18px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: #fff; }
.submit-box { background: #fff; padding: 20px; border-radius: 8px; text-align: right; box-shadow: 0 1px 5px rgba(0,0,0,0.1); margin: 0 auto 20px auto; position: relative; }
button { background: #673ab7; color: #fff; border: none; padding: 10px 22px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
button:disabled { background: #aaa; cursor: not-allowed; }

#statusMsg { font-size: 13px; font-weight: bold; margin-bottom: 10px; text-align: center; display: none; min-height: 20px; }
.success { color: #2e7d32; }
.error { color: #d32f2f; }

.table-scroll-container { width: 100%; max-height: 350px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin: 20px 0; scroll-behavior: smooth; }
#currentTable { width: 100%; border-collapse: collapse; font-size: 11px; }
#currentTable thead { position: sticky; top: 0; z-index: 10; }
#currentTable th { background: #546e7a; color: #fff; padding: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
#currentTable td { padding: 8px 10px; border-bottom: 1px solid #eee; text-align: center; }
#currentTable tr:nth-child(even) { background-color: #f9f9f9; }

#monthlyTable { width: 800px; border-collapse: separate; border-spacing: 2px; margin-top: 10px; font-size: 8px; }
#monthlyTable th, #monthlyTable td { padding: 2px 4px; text-align: center; border-radius: 5px; position: relative; min-width: 45px; }
.date-col { background: #f2f2f2cc; } 
.expense-col { background: rgba(255,100,100,0.2); color: #800000; }
.income-col { background: rgba(100,150,255,0.2); color: #003366; }
.text-col { background: #f8f8f8cc; text-align: left; padding-left: 5px; min-width: 100px; }
.balance-col { background: rgba(144,238,144,0.3); font-weight: bold; color: #155724; }
.has-val::after { content: '€'; margin-left:1px; font-weight: bold; }
</style>
<script src="https://unpkg.com/parse/dist/parse.min.js"></script>
<script>
Parse.initialize("nRZ2VJnuAxFbP1DPxK524AAL4rUh6avCTbTnQUsL", "MXB3Tw1iF1Cw1HrqKZFFUhf7DHETzaOezipXcPtw");
Parse.serverURL = 'https://parseapi.back4app.com/';
</script>
</head>
<body>
<div class="container">
    <div class="header"></div>
    <div class="form-title"><h1>ОТЧЕТ</h1></div>

    <input type="hidden" id="dateInput">

    <div class="question-card">
        <label>Избери опция</label>
        <select id="optionSelect">
            <option value="" disabled selected>Избери...</option>
            <optgroup label="ПРИХОДИ">
                <option>ПРИХОД БАР МАККУИН</option>
                <option>ПРИХОД МАККУИН</option>
                <option>ПРИХОД БАР СЪНСЕТ</option>
                <option>ПРИХОД АНИМАТОР</option>
                <option>ПРИХОД КАПАРО</option>
                <option>ДУГИ ПРИХОДИ</option>
                <option>ПЛАЩАНЕ С КАРТА</option>
            </optgroup>
            <optgroup label="РАЗХОДИ">
                <option>РАЗХОД С ФАКТУРИ</option>
                <option>РАЗХОД БЕЗ ФАКТУРИ</option>
                <option>ЗАПЛАТА/АВАНС</option>
            </optgroup>
            <optgroup label="КАСОВИ ОПЕРАЦИИ">
                <option>ВНЕСЕНИ В КАСА</option>
                <option>ИЗНЕСЕНИ ОТ КАСА</option>
            </optgroup>
        </select>
    </div>

    <div class="question-card">
        <label>Въведете сума</label>
        <div class="currency-input">
            <span class="currency-left">€</span>
            <input type="tel" id="amount_field" placeholder="0.00" oninput="this.value = this.value.replace(/[^0-9.]/g, '')">
        </div>
    </div>

    <div class="question-card">
        <label>Пояснения</label>
        <textarea rows="2" id="notes"></textarea>
    </div>

    <div class="submit-box">
        <div id="statusMsg"></div>
        <button id="submitBtn" disabled>Изпрати</button>
    </div>

    <div class="table-scroll-container" id="scrollContainer">
        <table id="currentTable">
            <thead>
                <tr><th>Дата</th><th>Опция</th><th>Сума (€)</th><th>Бележки</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:20px;">
        <div id="passwordPrompt">
            <label>Парола за Месечна база:</label>
            <input type="text" id="monthlyPassword" style="-webkit-text-security: disc; text-align:center; width:100px;" autocomplete="off">
            <button id="checkPassword">Покажи база</button>
            <p id="passError" style="color:red; display:none;">Грешна парола</p>
        </div>

        <div id="monthNav" style="display:none; justify-content: center; align-items: center; gap: 20px; margin-top: 10px;">
            <button onclick="changeMonth(-1)">◀ Назад</button>
            <div id="displayMonthYear" style="font-weight:bold;"></div>
            <button onclick="changeMonth(1)">Напред ▶</button>
        </div>

        <div id="cashBox" style="background:#f5f5ff; border:2px solid #673ab7; border-radius:8px; padding:10px; min-width:140px; text-align:center;">
            <div id="cashLabel" style="font-size:10px; color:#555;">ТЕКУЩА КАСА</div>
            <div id="currentCash" style="font-size:18px; font-weight:bold; color:#2e7d32;">0.00 €</div>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table id="monthlyTable" style="display:none;">
            <thead>
                <tr>
                    <th class="date-col">Дата</th>
                    <th class="expense-col">РАЗХОД ФАКТУРИ</th>
                    <th class="expense-col">РАЗХОД БЕЗ ФАКТ.</th>
                    <th class="expense-col">АВАНС И ЗАПЛАТИ</th>
                    <th class="income-col">БАР МАККУИН</th>
                    <th class="income-col">МАККУИН</th>
                    <th class="income-col">БАР СЪНСЕТ</th>
                    <th class="income-col">АНИМАТОР</th>
                    <th class="income-col">КАПАРО</th>
                    <th class="text-col">БЕЛЕЖКИ КАПАРО</th>
                    <th class="income-col">ДРУГИ</th>
                    <th class="income-col">ПЛАЩАНЕ КАРТА</th>
                    <th class="balance-col">КРАЙНО САЛДО</th>
                </tr>
            </thead>
            <tbody id="monthlyBody"></tbody>
        </table>
    </div>
</div>

<script>
const todayObj = new Date();
let viewDate = new Date(todayObj.getFullYear(), todayObj.getMonth(), 1);
const monthNames = ["ЯНУАРИ", "ФЕВРУАРИ", "МАРТ", "АПРИЛ", "МАЙ", "ЮНИ", "ЮЛИ", "АВГУСТ", "СЕПТЕМВРИ", "ОКТОМВРИ", "НОЕМВРИ", "ДЕКЕМВРИ"];
const mapping = {
    "РАЗХОД С ФАКТУРИ": 1, "РАЗХОД БЕЗ ФАКТУРИ": 2, "ЗАПЛАТА/АВАНС": 3,
    "ПРИХОД БАР МАККУИН": 4, "ПРИХОД МАККУИН": 5, "ПРИХОД БАР СЪНСЕТ": 6,
    "ПРИХОД АНИМАТОР": 7, "ПРИХОД КАПАРО": 8, "ДУГИ ПРИХОДИ": 10, "ПЛАЩАНЕ С КАРТА": 11
};

// Функция за автоматично скролване до долу
function scrollToBottom() {
    const container = document.getElementById('scrollContainer');
    setTimeout(() => {
        container.scrollTop = container.scrollHeight;
    }, 150);
}

function checkForm() {
    const val = parseFloat(document.getElementById('amount_field').value);
    document.getElementById('submitBtn').disabled = !(document.getElementById('optionSelect').value && !isNaN(val) && val > 0);
}
document.getElementById('amount_field').addEventListener('input', checkForm);
document.getElementById('optionSelect').addEventListener('change', checkForm);

function showStatus(text, type) {
    const msg = document.getElementById('statusMsg');
    msg.textContent = text;
    msg.className = type;
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
}

function changeMonth(dir) {
    viewDate.setMonth(viewDate.getMonth() + dir);
    loadData();
}

function recalculate(allEntries) {
    const m = viewDate.getMonth();
    const y = viewDate.getFullYear();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    document.getElementById('displayMonthYear').innerText = monthNames[m] + " " + y;
    document.getElementById('cashLabel').innerText = "НАЛИЧНА КАСА";

    const mBody = document.getElementById('monthlyBody');
    mBody.innerHTML = '';
    let monthlyRows = [];

    for(let d=1; d<=daysInMonth; d++){
        const row = document.createElement('tr');
        for(let i=0; i<13; i++){
            const td = document.createElement('td');
            if(i===0) td.textContent = `${d}.${m+1}`;
            else td.textContent = ''; 
            
            if([1,2,3].includes(i)) td.className='expense-col';
            if([4,5,6,7,8,10,11].includes(i)) td.className='income-col';
            if(i===12) td.className='balance-col';
            if(i===9) td.className='text-col';
            row.appendChild(td);
        }
        mBody.appendChild(row);
        monthlyRows.push(Array.from(row.children));
    }

    const todayISO = todayObj.toISOString().split('T')[0];
    document.querySelector('#currentTable tbody').innerHTML = '';
    let runningBal = 0;

    for(let d=1; d<=daysInMonth; d++) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayEntries = allEntries.filter(e => e.get("date") === dStr);
        const cells = monthlyRows[d-1];

        dayEntries.forEach(e => {
            const opt = e.get("option");
            const val = e.get("sum");
            const col = mapping[opt];

            if(col && col !== 9) {
                let curVal = parseFloat(cells[col].textContent) || 0;
                cells[col].textContent = (curVal + val).toFixed(2);
                cells[col].classList.add('has-val');
            }
            if(opt === "ПРИХОД КАПАРО") cells[9].textContent = (cells[9].textContent ? cells[9].textContent + ', ' : '') + (e.get("notes") || '');
            
            if (opt !== "ПЛАЩАНЕ С КАРТА") {
                if (opt === "ИЗНЕСЕНИ ОТ КАСА" || [1,2,3].includes(col)) runningBal -= val;
                else if (opt === "ВНЕСЕНИ В КАСА" || (col >= 4 && col !== 11)) runningBal += val;
            }

            if(dStr === todayISO) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${d}.${m+1}.${y}</td><td>${opt}</td><td>${val.toFixed(2)}</td><td>${e.get("notes")||''}</td>`;
                document.querySelector('#currentTable tbody').appendChild(tr);
            }
        });
        cells[12].textContent = runningBal.toFixed(2);
        cells[12].classList.add('has-val');
    }
    document.getElementById('currentCash').textContent = runningBal.toFixed(2) + ' €';
    
    // Скролваме до долу при всяко преизчисляване
    scrollToBottom();
}

async function loadData(){
    try {
        const results = await new Parse.Query("ReportEntry").limit(1000).ascending("date").find();
        recalculate(results);
    } catch(e) { console.error(e); }
}

document.getElementById('submitBtn').addEventListener('click', async () => {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    try {
        const Entry = Parse.Object.extend("ReportEntry");
        const entry = new Entry();
        await entry.save({
            date: todayObj.toISOString().split('T')[0],
            option: document.getElementById('optionSelect').value,
            sum: parseFloat(document.getElementById('amount_field').value),
            notes: document.getElementById('notes').value.trim()
        });
        showStatus("✅ Успешно изпратено!", "success");
        document.getElementById('amount_field').value = '';
        document.getElementById('notes').value = '';
        document.getElementById('optionSelect').selectedIndex = 0;
        await loadData();
    } catch(e) { showStatus("❌ Грешка!", "error"); }
    finally { btn.disabled = false; checkForm(); }
});

document.getElementById('checkPassword').addEventListener('click', () => {
    if(document.getElementById('monthlyPassword').value === '0000'){
        document.getElementById('monthlyTable').style.display = 'table';
        document.getElementById('monthNav').style.display = 'flex';
        document.getElementById('passwordPrompt').style.display = 'none';
    } else { document.getElementById('passError').style.display = 'block'; }
});

loadData();
</script>
</body>
</html>
