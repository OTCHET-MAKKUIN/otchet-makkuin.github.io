<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Форма Отчет</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body { margin: 0; background: #f0ebf8; font-family: 'Roboto', sans-serif; font-size: 12px; }
.container { max-width: 600px; margin: 40px auto; }
.header { background: #673ab7; height: 10px; border-radius: 8px 8px 0 0; }
.form-title { background: #fff; padding: 24px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-bottom: 15px; text-align:center; }
h1 { margin: 0; font-size: 24px; }
.question-card { background: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); border-left: 4px solid #673ab7; border-right: 4px solid #673ab7; }
label { display:block; margin-bottom:4px; font-weight:500; }
textarea, select, input[type="text"], input[type="password"], input[type="number"] { width: 100%; border: none; border-bottom: 2px solid #dadce0; padding: 4px 6px; font-size: 14px; background: transparent; }
textarea:focus, select:focus, input:focus { outline: none; border-bottom: 2px solid #673ab7; }
select { appearance: none; cursor: pointer; }
.currency-input { position: relative; display: flex; align-items: center; }
.currency-input .currency-left { position: absolute; left: 6px; font-weight: 500; color: #000; pointer-events: none; }
.currency-input input { width: 100%; padding-left: 18px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: #fff; }
.submit-box { background: #fff; padding: 20px; border-radius: 8px; text-align: right; box-shadow: 0 1px 5px rgba(0,0,0,0.1); max-width:500px; margin-left:auto; margin-right:auto; }
button { background: #673ab7; color: #fff; border: none; padding: 10px 22px; border-radius: 4px; cursor: pointer; }
button:disabled { background: #aaa; cursor: not-allowed; }
button:hover:enabled { background: #5e35b1; }
#monthlyTable, #currentTable { width: 100%; border-collapse: separate; border-spacing: 2px; margin-top: 20px; font-size: 8px; }
#monthlyTable th, #monthlyTable td, #currentTable th, #currentTable td { padding: 2px 4px; text-align: center; border-radius: 5px; position: relative; font-size:8px; }
.date-col { background: #f2f2f2cc; } 
.expense-col { background: rgba(255,100,100,0.2); color: #800000; }
.income-col { background: rgba(100,150,255,0.2); color: #003366; }
.text-col { background: #f8f8f8cc; text-align: left; padding-left: 5px; }
.balance-col { background: rgba(144,238,144,0.3); font-weight: bold; color: #155724; }
#monthlyTable td.income-col::after, #monthlyTable td.expense-col::after, #monthlyTable td.balance-col::after { content: '€'; position: absolute; right: 3px; font-weight: bold; color: inherit; }
</style>
<script src="https://unpkg.com/parse/dist/parse.min.js"></script>
<script>
Parse.initialize("nRZ2VJnuAxFbP1DPxK524AAL4rUh6avCTbTnQUsL", "MXB3Tw1iF1Cw1HrqKZFFUhf7DHETzaOezipXcPtw");
Parse.serverURL = 'https://parseapi.back4app.com/';
</script>
</head>
<body>
<div class="container">
    <div class="header"></div>
    <div class="form-title"><h1>ОТЧЕТ</h1></div>

    <input type="hidden" id="dateInput">

    <div class="question-card">
        <label>Избери опция</label>
        <select id="optionSelect">
            <option value="" disabled selected>Избери...</option>
            <option>ПРИХОД БАР МАККУИН</option>
            <option>ПРИХОД МАККУИН</option>
            <option>ПРИХОД БАР СЪНСЕТ</option>
            <option>ПРИХОД АНИМАТОР</option>
            <option>ПРИХОД КАПАРО</option>
            <option>ДУГИ ПРИХОДИ</option>
            <option disabled>─────────────</option>
            <option>РАЗХОД С ФАКТУРИ</option>
            <option>РАЗХОД БЕЗ ФАКТУРИ</option>
        </select>
    </div>

    <div class="question-card">
        <label>Въведете сума</label>
        <div class="currency-input">
            <span class="currency-left">€</span>
            <input type="number" step="0.01" placeholder="0.00" id="sumInput" onkeydown="return event.keyCode !== 69 && event.keyCode !== 107 && event.keyCode !== 109">
        </div>
    </div>

    <div class="question-card">
        <label>Пояснения</label>
        <textarea rows="2" id="notes"></textarea>
    </div>

    <div class="submit-box">
        <button id="submitBtn" disabled>Изпрати</button>
    </div>

    <table id="currentTable">
        <thead>
            <tr><th>Дата</th><th>Опция</th><th>Сума (€)</th><th>Пояснения</th></tr>
        </thead>
        <tbody></tbody>
        <tfoot>
            <tr>
                <td colspan="2" style="text-align:right; font-weight:bold;">Дневен оборот:</td>
                <td id="currentBalance">0.00</td>
                <td></td>
            </tr>
        </tfoot>
    </table>

    <div style="display:flex; align-items:center; gap:10px; justify-content:center; margin-top:20px;">
        <div id="passwordPrompt">
            <label>Въведи парола:</label>
            <input type="password" id="monthlyPassword" maxlength="4" style="width:100px; text-align:center;">
            <button id="checkPassword">Покажи база</button>
            <p id="passError" style="color:red; display:none;">Грешна парола</p>
        </div>

        <div id="cashBox" style="background:#f5f5ff; border:2px solid #673ab7; border-radius:8px; padding:10px; min-width:140px; text-align:center;">
            <div style="font-size:10px; color:#555;">ТЕКУЩА КАСА (МЕСЕЦ)</div>
            <div id="currentCash" style="font-size:18px; font-weight:bold; color:#2e7d32;">0.00 €</div>
        </div>
    </div>

    <table id="monthlyTable" style="display:none; margin-top:30px;">
        <thead>
            <tr>
                <th class="date-col">Дата</th>
                <th class="expense-col">РАЗХОД ФАКТУРИ</th>
                <th class="expense-col">РАЗХОД БЕЗ ФАКТ.</th>
                <th class="income-col">БАР МАККУИН</th>
                <th class="income-col">МАККУИН</th>
                <th class="income-col">БАР СЪНСЕТ</th>
                <th class="income-col">АНИМАТОР</th>
                <th class="income-col">КАПАРО</th>
                <th class="text-col">БЕЛЕЖКИ КАПАРО</th>
                <th class="income-col">ДРУГИ</th>
                <th class="balance-col">КРАЙНО САЛДО</th>
            </tr>
        </thead>
        <tbody id="monthlyBody"></tbody>
    </table>
</div>

<script>
// === ИНИЦИАЛИЗАЦИЯ ===
const dateInput = document.getElementById('dateInput');
const todayObj = new Date();
const currentMonth = todayObj.getMonth() + 1;
const currentYear = todayObj.getFullYear();
const todayISO = todayObj.toISOString().split('T')[0];
dateInput.value = todayISO;

const submitBtn = document.getElementById('submitBtn');
const optionSelect = document.getElementById('optionSelect');
const sumInput = document.getElementById('sumInput');
const notesInput = document.getElementById('notes');
const currentTbody = document.querySelector('#currentTable tbody');
const monthlyBody = document.getElementById('monthlyBody');
const currentCash = document.getElementById('currentCash');
const currentBalance = document.getElementById('currentBalance');

// Филтриране на входа - позволява само цифри и една точка
sumInput.addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9.]/g, ''); 
    if ((this.value.match(/\./g) || []).length > 1) {
        this.value = this.value.replace(/\.+$/, "");
    }
    checkForm();
});

function formatDate(dateStr) {
    if(!dateStr) return '';
    const d = new Date(dateStr);
    return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function checkForm() {
    const val = parseFloat(sumInput.value);
    submitBtn.disabled = !(optionSelect.value && !isNaN(val) && val > 0);
}
optionSelect.addEventListener('change', checkForm);

// === ГЕНЕРИРАНЕ НА МЕСЕЧНА ТАБЛИЦА ===
let monthlyData = [];
for(let day=1; day<=31; day++){
    const row = document.createElement('tr');
    for(let i=0; i<11; i++){
        const td = document.createElement('td');
        if(i===0) td.textContent = `${String(day).padStart(2,'0')}.${String(currentMonth).padStart(2,'0')}.${currentYear}`;
        else td.textContent = (i === 8) ? '' : '0.00';
        
        if(i===1 || i===2) td.className='expense-col';
        if([3,4,5,6,7,9].includes(i)) td.className='income-col';
        if(i===10) td.className='balance-col';
        if(i===8) td.className='text-col';
        row.appendChild(td);
    }
    monthlyBody.appendChild(row);
    monthlyData.push(Array.from(row.children));
}

function updateMonthlyTable(dateStr, option, sumValue, notes=''){
    const d = new Date(dateStr);
    if(d.getMonth() + 1 !== currentMonth) return;
    
    const day = d.getDate();
    const row = monthlyData[day-1];
    const mapping = {
        "РАЗХОД С ФАКТУРИ":1, "РАЗХОД БЕЗ ФАКТУРИ":2,
        "ПРИХОД БАР МАККУИН":3, "ПРИХОД МАККУИН":4,
        "ПРИХОД БАР СЪНСЕТ":5, "ПРИХОД АНИМАТОР":6,
        "ПРИХОД КАПАРО":7, "ДУГИ ПРИХОДИ":9
    };
    
    const colIndex = mapping[option];
    if(colIndex !== undefined){
        row[colIndex].textContent = (parseFloat(row[colIndex].textContent || 0) + sumValue).toFixed(2);
    }
    if(option === "ПРИХОД КАПАРО" && notes){
        row[8].textContent = (row[8].textContent === '' ? '' : row[8].textContent + ', ') + notes;
    }

    let runningBal = 0;
    monthlyData.forEach(r => {
        let inc = 0, exp = 0;
        for(let j=1; j<=9; j++){
            if(j===8) continue;
            const val = parseFloat(r[j].textContent) || 0;
            if(j===1 || j===2) exp += val; else inc += val;
        }
        runningBal += (inc - exp);
        r[10].textContent = runningBal.toFixed(2);
    });
    
    updateCurrentCashDisplay();
}

function updateCurrentTable(dateStr, option, sumValue, notes=''){
    if(dateStr !== todayISO) return;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${formatDate(dateStr)}</td><td>${option}</td><td>${sumValue.toFixed(2)}</td><td>${notes}</td>`;
    currentTbody.appendChild(tr);

    let dayTotal = Array.from(currentTbody.querySelectorAll('tr td:nth-child(3)'))
        .reduce((s, td) => s + parseFloat(td.textContent), 0);
    currentBalance.textContent = dayTotal.toFixed(2);
}

function updateCurrentCashDisplay() {
    const finalVal = monthlyData[monthlyData.length - 1][10].textContent;
    currentCash.textContent = finalVal + ' €';
}

async function loadData(){
    try {
        const query = new Parse.Query("ReportEntry");
        query.limit(1000);
        query.ascending("date");
        const results = await query.find();

        currentTbody.innerHTML = '';
        monthlyData.forEach(row => {
            for(let i=1; i<11; i++) row[i].textContent = (i===8?'':'0.00');
        });

        results.forEach(obj => {
            const d = obj.get("date"), o = obj.get("option"), s = obj.get("sum"), n = obj.get("notes") || '';
            updateMonthlyTable(d, o, s, n);
            updateCurrentTable(d, o, s, n);
        });
    } catch(e) { console.error(e); }
}

submitBtn.addEventListener('click', async () => {
    const opt = optionSelect.value;
    const val = parseFloat(sumInput.value);
    const nts = notesInput.value.trim();

    if(isNaN(val) || val <= 0) return;
    submitBtn.disabled = true;

    try {
        const Entry = Parse.Object.extend("ReportEntry");
        const entry = new Entry();
        await entry.save({ date: todayISO, option: opt, sum: val, notes: nts });
        
        updateMonthlyTable(todayISO, opt, val, nts);
        updateCurrentTable(todayISO, opt, val, nts);
        
        optionSelect.selectedIndex = 0;
        sumInput.value = '';
        notesInput.value = '';
        checkForm();
    } catch(e) { alert("Грешка при запис!"); }
    finally { submitBtn.disabled = false; }
});

document.getElementById('checkPassword').addEventListener('click', () => {
    if(document.getElementById('monthlyPassword').value === '0000'){
        document.getElementById('monthlyTable').style.display = 'table';
        document.getElementById('passwordPrompt').style.display = 'none';
    } else {
        document.getElementById('passError').style.display = 'block';
    }
});

loadData();
</script>
</body>
</html>
